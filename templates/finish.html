<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Merci - Artimir</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=31">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #050505, #15120a, #050505);
            color: #d4af37;
            font-family: Georgia, serif;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .card {
            width: min(520px, 90vw);
            padding: 40px;
            border: 1px solid rgba(212,175,55,0.6);
            border-radius: 26px;
            background: rgba(10,10,10,0.78);
            box-shadow: 0 0 50px rgba(212,175,55,0.25);
        }

        h1 {
            color: #fff1a8;
            text-shadow: 0 0 20px rgba(212,175,55,0.6);
        }

        p {
            font-size: 18px;
            line-height: 1.6;
        }

        .small {
            margin-top: 25px;
            opacity: 0.65;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>🎨 Merci d’avoir utilisé Artimir</h1>
    <p>Passez une agréable journée.</p>
    <p>Merci de laisser votre place aux autres utilisateurs.</p>

    <div class="small">
        Vous allez être redirigé automatiquement dans quelques secondes.
    </div>
</div>

<script>
    setTimeout(() => {
        window.location.href = "/";
    }, 10000);
</script>

</body>
</html>
